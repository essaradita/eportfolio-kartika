<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin · E-Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #fde8f0 0%, #ede8f8 50%, #e8f5ee 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-box {
      background: white;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(200,150,180,0.2);
      text-align: center;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .login-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f8b4c8, #c9b8e8);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1.25rem;
      box-shadow: 0 4px 16px rgba(232,120,154,0.3);
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #3d2c3e;
      margin-bottom: 0.25rem;
    }

    p.sub {
      font-size: 0.82rem;
      color: #9b8a9e;
      margin-bottom: 2rem;
    }

    .field {
      position: relative;
      margin-bottom: 1rem;
      text-align: left;
    }

    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #6b5b6e;
      margin-bottom: 0.4rem;
    }

    .field input {
      width: 100%;
      padding: 0.7rem 2.8rem 0.7rem 1rem;
      border: 2px solid #fde8f0;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      color: #3d2c3e;
      outline: none;
      transition: border 0.2s;
      background: #fdf8f5;
    }

    .field input:focus { border-color: #e8789a; background: white; }

    .toggle-pw {
      position: absolute;
      right: 0.75rem;
      bottom: 0.7rem;
      cursor: pointer;
      font-size: 1rem;
      user-select: none;
    }

    .btn-login {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #e8789a, #c9b8e8);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 0.5rem;
    }

    .btn-login:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }

    .error-msg {
      display: none;
      background: #fde8f0;
      color: #e8789a;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.6rem 1rem;
      border-radius: 10px;
      margin-top: 0.75rem;
    }

    .error-msg.show { display: block; animation: shake 0.4s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    .back-link {
      display: block;
      margin-top: 1.25rem;
      font-size: 0.78rem;
      color: #9b8a9e;
      text-decoration: none;
    }

    .back-link:hover { color: #e8789a; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-avatar">🌸</div>
    <h1>Admin Login</h1>
    <p class="sub">Halaman ini hanya untuk pemilik portofolio</p>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Masukkan username" autocomplete="off" />
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Masukkan password" />
      <span class="toggle-pw" onclick="togglePw()">👁️</span>
    </div>

    <button class="btn-login" onclick="doLogin()">Masuk</button>
    <div class="error-msg" id="error-msg">❌ Username atau password salah</div>

    <a href="index.html" class="back-link">← Kembali ke Portofolio</a>
  </div>

  <script>
    // ==============================
    // GANTI USERNAME & PASSWORD DI SINI
    const ADMIN_USER = 'kartika';
    const ADMIN_PASS = 'kartika2026';
    // ==============================

    function doLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const err  = document.getElementById('error-msg');

      if (user === ADMIN_USER && pass === ADMIN_PASS) {
        // Simpan sesi di sessionStorage (hilang saat browser ditutup)
        sessionStorage.setItem('ppg_admin', 'true');
        window.location.href = 'index.html';
      } else {
        err.classList.remove('show');
        void err.offsetWidth; // reset animasi
        err.classList.add('show');
      }
    }

    // Login dengan Enter
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    function togglePw() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    // Kalau sudah login, langsung redirect
    if (sessionStorage.getItem('ppg_admin') === 'true') {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
